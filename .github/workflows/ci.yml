name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: typecheck + test (Node 20)
    # Matrice multi-OS: valida la compilazione nativa di better-sqlite3 (FTS5)
    # su tutte le piattaforme target prima di una release.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
